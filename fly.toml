app = 'omegaelz-crm'
primary_region = 'jnb'

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DATABASE_URL = "sqlite:///data/omegaelz.db"
  JWT_SECRET = "omegaelz-crm-secret-key-2026-fly"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = 'crm_data'
  destination = '/data'

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
