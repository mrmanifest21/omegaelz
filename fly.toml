# fly.toml app configuration file generated for omegaelz on 2026-06-05T12:06:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'omegaelz'
primary_region = 'jnb'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_URL = 'sqlite:///data/omegaelz.db'
  JWT_SECRET = 'omegaelz-crm-secret-key-2026-fly'
  NODE_ENV = 'production'
  PORT = '3000'

[[mounts]]
  source = 'crm_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
